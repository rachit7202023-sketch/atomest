<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->
    <title>Atomest — The Internet's Toolbox</title>
    <meta name="description" content="31+ free online tools for developers, students, creators and everyone. No sign-up required." />
    <meta name="application-name" content="Atomest" />
    <meta name="author" content="Atomest" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="canonical" href="https://atomest.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atomest" />
    <meta property="og:url" content="https://atomest.com" />
    <meta property="og:title" content="Atomest — The Internet's Toolbox" />
    <meta property="og:description" content="31+ free online tools for developers, students, creators and everyone. No sign-up required." />
    <meta property="og:image" content="https://atomest.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Atomest — The Internet's Toolbox" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@atomest" />
    <meta name="twitter:title" content="Atomest — The Internet's Toolbox" />
    <meta name="twitter:description" content="31+ free online tools for developers, students, creators and everyone. No sign-up required." />
    <meta name="twitter:image" content="https://atomest.com/opengraph.jpg" />
    <meta name="twitter:image:alt" content="Atomest — The Internet's Toolbox" />

    <!-- PWA / Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Atomest",
      "alternateName": "Atomest — The Internet's Toolbox",
      "url": "https://atomest.com",
      "description": "31+ free online tools for developers, students, creators and everyone. No sign-up required.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://atomest.com/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
